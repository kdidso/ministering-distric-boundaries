<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Ministering Districts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .info {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 6px;
      font-family: sans-serif;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<div id="map"></div>
<div class="info" id="infoBox">Hover over a district</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([37.13, -113.6], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const infoBox = document.getElementById("infoBox");

  let polygonLayer;
  let pointLayer;

  function polygonStyle(feature) {
    const color = feature.properties.district_color || "#888888";

    return {
      color: "#000000",
      weight: 3,
      opacity: 1,
      fillColor: color,
      fillOpacity: 0.5
    };
  }

  function highlightPolygon(e) {
    const layer = e.target;

    layer.setStyle({
      weight: 5,
      color: "#000000",
      fillOpacity: 0.7
    });

    if (layer.bringToFront) {
      layer.bringToFront();
    }
    if (pointLayer && pointLayer.bringToFront) {
      pointLayer.bringToFront();
    }

    const props = layer.feature.properties;
    infoBox.innerHTML = `<b>District ${Number(props.district_id) + 1}</b>`;
  }

  function resetPolygonHighlight(e) {
    polygonLayer.resetStyle(e.target);
    infoBox.innerHTML = "Hover over a district";
  }

  function onEachPolygon(feature, layer) {
    layer.on({
      mouseover: highlightPolygon,
      mouseout: resetPolygonHighlight,
      click: function () {
        const props = feature.properties;
        layer.bindPopup(`<b>District ${Number(props.district_id) + 1}</b>`).openPopup();
      }
    });
  }

  function getDisplayName(props) {
    const last = (props.Last_Name || "").trim();
    const first = (props.First_Name || "").trim();

    if (last && first) return `${last}, ${first}`;
    if (last) return last;
    if (first) return first;
    return "Member";
  }

  Promise.all([
    fetch('./incoming/district_assignment_dissolved.geojson').then(res => res.json()),
    fetch('./incoming/district_points.geojson').then(res => res.json())
  ])
    .then(([polygonData, pointData]) => {
      polygonLayer = L.geoJSON(polygonData, {
        style: polygonStyle,
        onEachFeature: onEachPolygon
      }).addTo(map);

      pointLayer = L.geoJSON(pointData, {
        pointToLayer: function (feature, latlng) {
          const color = feature.properties.district_color || "#000000";

          return L.circleMarker(latlng, {
            radius: 7,
            fillColor: color,
            color: "#000000",
            weight: 2,
            opacity: 1,
            fillOpacity: 1,
            bubblingMouseEvents: false
          });
        },
        onEachFeature: function (feature, layer) {
          const props = feature.properties;
          const districtLabel = props.district_id !== undefined
            ? `District ${Number(props.district_id) + 1}`
            : "District";

          const displayName = getDisplayName(props);

          layer.bindPopup(`
            <b>${displayName}</b><br>
            ${districtLabel}
          `);

          layer.on("mouseover", function () {
            layer.setStyle({
              radius: 9,
              weight: 3
            });
          });

          layer.on("mouseout", function () {
            layer.setStyle({
              radius: 7,
              weight: 2
            });
          });
        }
      }).addTo(map);

      map.fitBounds(polygonLayer.getBounds());

      if (pointLayer.bringToFront) {
        pointLayer.bringToFront();
      }
    })
    .catch(err => {
      console.error("Failed to load map layers:", err);
    });
</script>

</body>
</html>
