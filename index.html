<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Ministering Districts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .info {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 6px;
      font-family: sans-serif;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      line-height: 1.4;
      min-width: 220px;
    }

    .district-label {
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid #000;
      border-radius: 999px;
      padding: 4px 8px;
      font-family: sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #000;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      cursor: pointer;
    }

    .member-name-tooltip {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #555;
      border-radius: 999px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      padding: 2px 8px;
      font-family: sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #111;
    }

    .member-name-tooltip::before {
      display: none;
    }

    .export-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1100;
      width: 250px;
      background: rgba(255,255,255,0.97);
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.28);
      font-family: sans-serif;
    }

    .export-panel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .export-panel label {
      display: block;
      margin-top: 8px;
      margin-bottom: 4px;
      font-size: 13px;
      font-weight: 600;
    }

    .export-panel select,
    .export-panel input[type="text"],
    .export-panel button {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      font-size: 13px;
      border-radius: 5px;
      border: 1px solid #bbb;
      font-family: sans-serif;
    }

    .export-panel button {
      margin-top: 12px;
      cursor: pointer;
      border: none;
      background: #2c7be5;
      color: white;
      font-weight: 700;
    }

    .export-panel button:hover {
      background: #1f64c2;
    }

    .export-panel .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 13px;
      font-weight: 600;
    }

    .export-panel .checkbox-row input {
      margin: 0;
      width: auto;
    }

    #exportRenderArea {
      position: fixed;
      left: -99999px;
      top: 0;
      background: white;
      overflow: hidden;
      z-index: -1;
    }

    .export-layout {
      position: relative;
      width: 100%;
      height: 100%;
      background: white;
      font-family: Arial, sans-serif;
    }

    .export-header {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      height: 90px;
      box-sizing: border-box;
      padding: 18px 24px 10px 24px;
      background: white;
      border-bottom: 1px solid #d8d8d8;
    }

    .export-header h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      color: #111;
    }

    .export-subtitle {
      margin-top: 6px;
      font-size: 14px;
      color: #555;
    }

    .export-map-wrap {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 110px;
      bottom: 20px;
      border: 1px solid #ccc;
      overflow: hidden;
      background: white;
    }

    .export-map {
      width: 100%;
      height: 100%;
      background: white;
    }

    .export-map .leaflet-pane,
    .export-map .leaflet-top,
    .export-map .leaflet-bottom,
    .export-map .leaflet-control-container {
      transform: none !important;
    }

    .leaflet-control-attribution {
      font-size: 10px;
    }
  .export-district-label {
  background: rgba(255, 255, 255, 0.82);
  border: 1px solid #222;
  border-radius: 999px;
  padding: 2px 6px;
  font-family: sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: #111;
  text-align: center;
  white-space: nowrap;
  box-shadow: 0 1px 2px rgba(0,0,0,0.18);
  line-height: 1.1;
}
  .export-district-text {
  font-family: sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #111;
  text-shadow:
    -1px -1px 0 rgba(255,255,255,0.95),
     1px -1px 0 rgba(255,255,255,0.95),
    -1px  1px 0 rgba(255,255,255,0.95),
     1px  1px 0 rgba(255,255,255,0.95);
  white-space: nowrap;
  line-height: 1.1;
}
.export-panel {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 1100;
  width: 250px;
  background: rgba(255,255,255,0.97);
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.28);
  font-family: sans-serif;
  overflow: hidden;
}

.export-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  font-size: 15px;
  font-weight: 700;
  background: rgba(255,255,255,0.98);
  border-bottom: 1px solid #ddd;
}

.export-panel-toggle {
  border: 1px solid #bbb;
  background: white;
  border-radius: 5px;
  padding: 5px 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}

.export-panel-toggle:hover {
  background: #f3f3f3;
}

.export-panel-body {
  padding: 12px;
}

.export-panel.collapsed .export-panel-body {
  display: none;
}

.export-panel.collapsed {
  width: 170px;
}

.export-panel.collapsed .export-panel-header {
  border-bottom: none;
}
  </style>
</head>
<body>

<div id="map"></div>

<div class="export-panel collapsed" id="exportPanel">
  <div class="export-panel-header">
    <span>Export Map</span>
    <button type="button" id="toggleExportPanelBtn" class="export-panel-toggle">Expand</button>
  </div>

  <div class="export-panel-body" id="exportPanelBody">
    <label for="exportFormat">Format</label>
    <select id="exportFormat">
      <option value="png">PNG</option>
      <option value="jpeg" selected>JPEG</option>
      <option value="pdf">PDF</option>
    </select>

    <label for="exportSize">Size</label>
    <select id="exportSize">
      <option value="web" selected>Web Image (1600 × 900)</option>
      <option value="letter_landscape">Letter Landscape</option>
      <option value="letter_portrait">Letter Portrait</option>
    </select>

    <label for="exportDpi">DPI</label>
    <select id="exportDpi">
      <option value="150">150</option>
      <option value="200">200</option>
      <option value="300" selected>300</option>
    </select>

    <label for="exportTitle">Map Title</label>
    <input type="text" id="exportTitle" value="Ministering Districts" />

    <label class="checkbox-row">
      <input type="checkbox" id="includeTimestamp" checked />
      <span>Include timestamp</span>
    </label>

    <label class="checkbox-row">
      <input type="checkbox" id="includeExportPoints" />
      <span>Include member points</span>
    </label>

    <button id="exportMapBtn">Export Current View</button>
  </div>
</div>

<div class="info" id="infoBox">
  <div id="infoText">Hover over a district</div>
  <hr style="margin:8px 0;">
  <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
    <input type="checkbox" id="toggleNameLabels">
    <span>Show member names on hover</span>
  </label>
</div>

<div id="exportRenderArea"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>
  const map = L.map('map').setView([37.13, -113.6], 13);

  const baseTileUrl = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
  const baseTileOptions = {
    attribution: '&copy; OpenStreetMap contributors'
  };

  L.tileLayer(baseTileUrl, baseTileOptions).addTo(map);

  const infoText = document.getElementById("infoText");
  const toggleNameLabels = document.getElementById("toggleNameLabels");

  const exportButton = document.getElementById("exportMapBtn");
  const exportRenderArea = document.getElementById("exportRenderArea");
  const exportPanel = document.getElementById("exportPanel");
  const toggleExportPanelBtn = document.getElementById("toggleExportPanelBtn");

  let polygonLayer;
  let pointLayer;
  let districtLabelLayer;
  let showHoverLabels = false;

  let polygonDataGlobal = null;
  let pointDataGlobal = null;
  let wardBoundaryDataGlobal = null;
  const districtStats = new Map();

  const DISTRICT_PALETTE = [
    "#e41a1c",
    "#377eb8",
    "#4daf4a",
    "#984ea3",
    "#ff7f00",
    "#ffff33",
    "#a65628",
    "#f781bf",
    "#17becf",
    "#66a61e",
    "#d62728",
    "#1f77b4"
  ];

function isLikelyMobileOrTablet() {
  return /iPad|iPhone|iPod|Android/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}
  
  function getDistrictNumber(props) {
    return Number(props.district_id) + 1;
  }

  function getDistrictColor(props) {
    const districtId = Number(props.district_id);
    if (Number.isFinite(districtId)) {
      return DISTRICT_PALETTE[districtId % DISTRICT_PALETTE.length];
    }
    return "#888888";
  }

  function normalizeYesNo(value) {
    return String(value ?? "").trim().toLowerCase();
  }

  function buildDistrictStats(pointData) {
    districtStats.clear();

    for (const feature of pointData.features || []) {
      const props = feature.properties || {};
      const districtId = Number(props.district_id);

      if (!Number.isFinite(districtId)) continue;

      if (!districtStats.has(districtId)) {
        districtStats.set(districtId, {
          assignedYes: 0,
          assignedNo: 0,
          total: 0
        });
      }

      const stats = districtStats.get(districtId);
      const assignedToMinister = normalizeYesNo(props.Assigned_to_minister);

      if (assignedToMinister === "yes") {
        stats.assignedYes++;
      } else if (assignedToMinister === "no") {
        stats.assignedNo++;
      }

      stats.total++;
    }
  }

  function getDistrictStats(districtId) {
    return districtStats.get(Number(districtId)) || {
      assignedYes: 0,
      assignedNo: 0,
      total: 0
    };
  }

  function getDistrictPopupHtml(props) {
    const districtNum = getDistrictNumber(props);
    const stats = getDistrictStats(props.district_id);

    return `
      <b>District ${districtNum}</b><br><br>
      <b>Assigned_to_minister = yes:</b> ${stats.assignedYes}<br>
      <b>Assigned_to_minister = no:</b> ${stats.assignedNo}<br>
      <b>District total:</b> ${stats.total}
    `;
  }

  function polygonStyle(feature) {
    const color = getDistrictColor(feature.properties);

    return {
      color: "#000000",
      weight: 3,
      opacity: 1,
      fillColor: color,
      fillOpacity: 0.5
    };
  }

  function highlightPolygon(layer) {
    layer.setStyle({
      weight: 5,
      color: "#000000",
      fillOpacity: 0.7
    });

    const props = layer.feature.properties;
    const stats = getDistrictStats(props.district_id);

    infoText.innerHTML = `
      <b>District ${getDistrictNumber(props)}</b><br>
      Yes: ${stats.assignedYes} | No: ${stats.assignedNo} | Total: ${stats.total}
    `;
  }

  function resetPolygonStyle(layer) {
    if (polygonLayer) {
      polygonLayer.resetStyle(layer);
    }
    infoText.innerHTML = "Hover over a district";
  }

  function openDistrictPopup(layer) {
    const props = layer.feature.properties;
    layer.bindPopup(getDistrictPopupHtml(props)).openPopup();
  }

  function onEachPolygon(feature, layer) {
    layer.on({
      mouseover: function () {
        highlightPolygon(layer);
      },
      mouseout: function () {
        resetPolygonStyle(layer);
      },
      click: function () {
        openDistrictPopup(layer);
      }
    });
  }

  function getDisplayName(props) {
    const last = (props.Last_Name || "").trim();
    const first = (props.First_Name || "").trim();

    if (last && first) return `${last}, ${first}`;
    if (last) return last;
    if (first) return first;
    return "Member";
  }

  function formatYesNo(val) {
    if (val === null || val === undefined) return "Unknown";
    if (typeof val === "string") return val.toLowerCase() === "yes" ? "Yes" : "No";
    if (typeof val === "number") return val === 1 ? "Yes" : "No";
    return val;
  }

  function createDistrictLabels(polygonData) {
    if (districtLabelLayer) {
      map.removeLayer(districtLabelLayer);
    }

    districtLabelLayer = L.layerGroup();

    polygonData.features.forEach(feature => {
      const tempLayer = L.geoJSON(feature);
      const center = tempLayer.getBounds().getCenter();
      const districtNum = getDistrictNumber(feature.properties);

      const labelMarker = L.marker(center, {
        icon: L.divIcon({
          className: "",
          html: `<div class="district-label">District ${districtNum}</div>`
        })
      });

      labelMarker.on("click", function () {
        const matchingLayer = findPolygonLayerByDistrictId(feature.properties.district_id);
        if (matchingLayer) {
          highlightPolygon(matchingLayer);
          openDistrictPopup(matchingLayer);
        }
      });

      districtLabelLayer.addLayer(labelMarker);
    });

    districtLabelLayer.addTo(map);
  }

  function findPolygonLayerByDistrictId(districtId) {
    let found = null;

    polygonLayer.eachLayer(layer => {
      if (String(layer.feature.properties.district_id) === String(districtId)) {
        found = layer;
      }
    });

    return found;
  }

function getExportDimensions(sizePreset, dpi) {
  dpi = Number(dpi);

  const isMobile = isLikelyMobileOrTablet();

  if (sizePreset === "web") {
    return {
      width: 1600,
      height: 900,
      pdfWidthIn: 11,
      pdfHeightIn: 8.5,
      orientation: "landscape"
    };
  }

  if (sizePreset === "letter_landscape") {
    const effectiveDpi = isMobile ? Math.min(dpi, 150) : dpi;

    return {
      width: Math.round(11 * effectiveDpi),
      height: Math.round(8.5 * effectiveDpi),
      pdfWidthIn: 11,
      pdfHeightIn: 8.5,
      orientation: "landscape"
    };
  }

  if (sizePreset === "letter_portrait") {
    const effectiveDpi = isMobile ? Math.min(dpi, 150) : dpi;

    return {
      width: Math.round(8.5 * effectiveDpi),
      height: Math.round(11 * effectiveDpi),
      pdfWidthIn: 8.5,
      pdfHeightIn: 11,
      orientation: "portrait"
    };
  }

  return {
    width: 1600,
    height: 900,
    pdfWidthIn: 11,
    pdfHeightIn: 8.5,
    orientation: "landscape"
  };
}

  function formatTimestamp() {
    const now = new Date();
    return now.toLocaleString();
  }

  function downloadDataUrl(dataUrl, filename) {
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  function safeFilename(text) {
    return String(text || "map")
      .trim()
      .replace(/[^a-z0-9_\- ]/gi, "")
      .replace(/\s+/g, "_");
  }

function addExportDistrictLabels(exportMap, polygonData) {
  polygonData.features.forEach(feature => {
    const tempLayer = L.geoJSON(feature);
    const center = tempLayer.getBounds().getCenter();
    const districtNum = getDistrictNumber(feature.properties);

    L.marker(center, {
      interactive: false,
      keyboard: false,
      icon: L.divIcon({
        className: "",
        html: `<div class="export-district-text">District ${districtNum}</div>`
      })
    }).addTo(exportMap);
  });
}

  function waitForTileLayers(mapInstance) {
    return new Promise(resolve => {
      const tileLayers = [];

      mapInstance.eachLayer(layer => {
        if (layer instanceof L.TileLayer) {
          tileLayers.push(layer);
        }
      });

      if (!tileLayers.length) {
        setTimeout(resolve, 500);
        return;
      }

      let settled = false;
      let loadedCount = 0;

      function finish() {
        if (!settled) {
          settled = true;
          resolve();
        }
      }

      tileLayers.forEach(layer => {
        layer.on("load", function onLoad() {
          loadedCount += 1;
          layer.off("load", onLoad);

          if (loadedCount >= tileLayers.length) {
            finish();
          }
        });
      });

      setTimeout(finish, 4000);
    });
  }

  async function buildExportCanvas() {
    if (!polygonDataGlobal || !pointDataGlobal) {
      throw new Error("Map data is not loaded yet.");
    }

    const format = document.getElementById("exportFormat").value;
    const sizePreset = document.getElementById("exportSize").value;
    const dpi = document.getElementById("exportDpi").value;
    const title = document.getElementById("exportTitle").value.trim() || "Ministering Districts";
    const includeTimestamp = document.getElementById("includeTimestamp").checked;
    const includeExportPoints = document.getElementById("includeExportPoints").checked;

    const dims = getExportDimensions(sizePreset, dpi);

    exportRenderArea.innerHTML = "";
    exportRenderArea.style.width = dims.width + "px";
    exportRenderArea.style.height = dims.height + "px";

    const layout = document.createElement("div");
    layout.className = "export-layout";
    layout.style.width = dims.width + "px";
    layout.style.height = dims.height + "px";

    const header = document.createElement("div");
    header.className = "export-header";

    const titleEl = document.createElement("h1");
    titleEl.textContent = title;
    header.appendChild(titleEl);

    if (includeTimestamp) {
      const subtitleEl = document.createElement("div");
      subtitleEl.className = "export-subtitle";
      subtitleEl.textContent = "Exported: " + formatTimestamp();
      header.appendChild(subtitleEl);
    }

    const mapWrap = document.createElement("div");
    mapWrap.className = "export-map-wrap";

    const exportMapDiv = document.createElement("div");
    exportMapDiv.className = "export-map";

    mapWrap.appendChild(exportMapDiv);
    layout.appendChild(header);
    layout.appendChild(mapWrap);
    exportRenderArea.appendChild(layout);

const districtBounds = L.geoJSON(polygonDataGlobal).getBounds();
const wardBounds = wardBoundaryDataGlobal
  ? L.geoJSON(wardBoundaryDataGlobal).getBounds()
  : districtBounds;

const exportBounds = L.latLngBounds(
  L.latLng(districtBounds.getSouth(), wardBounds.getWest()),
  L.latLng(districtBounds.getNorth(), wardBounds.getEast())
);

    const exportMap = L.map(exportMapDiv, {
      zoomControl: false,
      attributionControl: true,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      boxZoom: false,
      keyboard: false,
      tap: false,
      touchZoom: false,
      preferCanvas: true,
      zoomAnimation: false,
      fadeAnimation: false,
      markerZoomAnimation: false
    });

    L.tileLayer(baseTileUrl, baseTileOptions).addTo(exportMap);

    const exportRenderer = L.canvas({ padding: 0.5 });

    L.geoJSON(polygonDataGlobal, {
      renderer: exportRenderer,
      style: function(feature) {
        const color = getDistrictColor(feature.properties);
        return {
          renderer: exportRenderer,
          color: "#000000",
          weight: 3,
          opacity: 1,
          fillColor: color,
          fillOpacity: 0.5,
          interactive: false
        };
      },
      interactive: false
    }).addTo(exportMap);

    if (includeExportPoints) {
      L.geoJSON(pointDataGlobal, {
        renderer: exportRenderer,
        interactive: false,
        pointToLayer: function (feature, latlng) {
          const color = getDistrictColor(feature.properties);

          return L.circleMarker(latlng, {
            renderer: exportRenderer,
            radius: 4,
            fillColor: color,
            color: "#111111",
            weight: 1,
            opacity: 0.7,
            fillOpacity: 0.65,
            interactive: false
          });
        }
      }).addTo(exportMap);
    }

    addExportDistrictLabels(exportMap, polygonDataGlobal);

exportMap.fitBounds(exportBounds, {
  animate: false,
  padding: [0, 0]
});

await waitForTileLayers(exportMap);
await new Promise(resolve => setTimeout(resolve, isLikelyMobileOrTablet() ? 900 : 1500));

const isMobile = isLikelyMobileOrTablet();

const canvas = await html2canvas(layout, {
  useCORS: true,
  backgroundColor: "#ffffff",
  scale: isMobile ? 1 : 1,
  logging: false
});

    exportMap.remove();

    return {
      canvas,
      format,
      dims,
      title
    };
  }

  async function exportCurrentView() {
    exportButton.disabled = true;
    exportButton.textContent = "Exporting...";

    try {
      const { canvas, format, dims, title } = await buildExportCanvas();
      const fileBase = safeFilename(title);

      if (format === "png") {
        const dataUrl = canvas.toDataURL("image/png");
        downloadDataUrl(dataUrl, `${fileBase}.png`);
      } else if (format === "jpeg") {
        const dataUrl = canvas.toDataURL("image/jpeg", 0.95);
        downloadDataUrl(dataUrl, `${fileBase}.jpg`);
      } else if (format === "pdf") {
        const { jsPDF } = window.jspdf;

        const pdf = new jsPDF({
          orientation: dims.orientation,
          unit: "in",
          format: [dims.pdfWidthIn, dims.pdfHeightIn]
        });

        const imgData = canvas.toDataURL("image/jpeg", 0.98);
        pdf.addImage(
          imgData,
          "JPEG",
          0,
          0,
          dims.pdfWidthIn,
          dims.pdfHeightIn
        );

        pdf.save(`${fileBase}.pdf`);
      }
    } catch (err) {
      console.error("Export failed:", err);
      alert("Export failed. Check the browser console for details.");
    } finally {
      exportButton.disabled = false;
      exportButton.textContent = "Export Current View";
    }
  }

  exportButton.addEventListener("click", exportCurrentView);
  toggleExportPanelBtn.addEventListener("click", function () {
  const isCollapsed = exportPanel.classList.toggle("collapsed");
  toggleExportPanelBtn.textContent = isCollapsed ? "Expand" : "Minimize";
});

Promise.all([
  fetch('./incoming/district_assignment_dissolved.geojson').then(res => res.json()),
  fetch('./incoming/district_points.geojson').then(res => res.json()),
  fetch('./incoming/ward_boundaries_JSO.geojson').then(res => res.json())
])
.then(([polygonData, pointData, wardBoundaryData]) => {
  polygonDataGlobal = polygonData;
  pointDataGlobal = pointData;
  wardBoundaryDataGlobal = wardBoundaryData;

      buildDistrictStats(pointData);

      polygonLayer = L.geoJSON(polygonData, {
        style: polygonStyle,
        onEachFeature: onEachPolygon
      }).addTo(map);

      createDistrictLabels(polygonData);

      pointLayer = L.geoJSON(pointData, {
        pointToLayer: function (feature, latlng) {
          const color = getDistrictColor(feature.properties);

          return L.circleMarker(latlng, {
            radius: 7,
            fillColor: color,
            color: "#000000",
            weight: 2,
            opacity: 1,
            fillOpacity: 1
          });
        },
        onEachFeature: function (feature, layer) {
          const props = feature.properties;
          const districtLabel = `District ${getDistrictNumber(props)}`;
          const displayName = getDisplayName(props);

          const assignedToMinister = formatYesNo(props.Assigned_to_minister);
          const isAssignedMinisters = formatYesNo(props.Is_assigned_ministers);

          layer.bindPopup(`
            <b>${displayName}</b><br>
            ${districtLabel}<br><br>
            <b>Assigned to Minister:</b> ${assignedToMinister}<br>
            <b>Has Assigned Ministers:</b> ${isAssignedMinisters}
          `);

          layer.bindTooltip(
            `<span>${displayName}</span>`,
            {
              permanent: false,
              sticky: true,
              direction: "top",
              offset: [0, -10],
              className: "member-name-tooltip"
            }
          );

          layer.on("mouseover", function () {
            layer.setStyle({
              radius: 9,
              weight: 3
            });

            if (showHoverLabels) {
              layer.openTooltip();
            }
          });

          layer.on("mouseout", function () {
            layer.setStyle({
              radius: 7,
              weight: 2
            });

            layer.closeTooltip();
          });
        }
      }).addTo(map);

      map.fitBounds(polygonLayer.getBounds());

      if (districtLabelLayer) districtLabelLayer.bringToFront();
      if (pointLayer) pointLayer.bringToFront();

      toggleNameLabels.addEventListener("change", function () {
        showHoverLabels = toggleNameLabels.checked;

        if (!showHoverLabels && pointLayer) {
          pointLayer.eachLayer(layer => {
            if (layer.closeTooltip) {
              layer.closeTooltip();
            }
          });
        }
      });
    })
    .catch(err => {
      console.error("Failed to load map layers:", err);
    });
</script>

</body>
</html>
