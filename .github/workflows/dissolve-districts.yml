name: Dissolve district GeoJSON

on:
  workflow_dispatch:
  push:
    paths:
      - "incoming/district_assignment.geojson"
      - "scripts/dissolve_districts.py"
      - ".github/workflows/dissolve-districts.yml"

permissions:
  contents: write

jobs:
  dissolve:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install geospatial dependencies
        run: |
          python -m pip install --upgrade pip
          pip install geopandas pyogrio shapely fiona

      - name: Run dissolve script
        run: python scripts/dissolve_districts.py

      - name: Show outputs
        run: |
          echo "Incoming folder contents:"
          ls -lah incoming || true
          echo ""
          echo "Git status:"
          git status --short

      - name: Commit dissolved output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add incoming/district_assignment_dissolved.geojson

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Generate dissolved district GeoJSON"
            git push
          fi
